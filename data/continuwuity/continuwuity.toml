[global]
server_name = "sky0cloud.dpdns.org"
database_path = "/var/lib/continuwuity"
address = ["0.0.0.0"]
port = 8008

# --- Registration ---
allow_registration = true
registration_token = "" # (optional: set if you want invite-only)
new_user_displayname_suffix = ""

# Require email (after SMTP works)
require_email_for_registration = true

# --- Security ---
allow_federation = true
allow_encryption = true

# Lock down public scraping
require_auth_for_profile_requests = true
allow_public_room_directory_over_federation = false

# Optional: block random invites from users
block_non_admin_invites = true

# --- Admins ---
admins_list = [
  "@admin:sky0cloud.dpdns.org",
  "@dienic:sky0cloud.dpdns.org",
  "@conduit:sky0cloud.dpdns.org"
]

# --- Auto join rooms ---
auto_join_rooms = [
  "!2MBteHG2EqAuy4GWiU:sky0cloud.dpdns.org",
  "!w22RyA5q5qtKTnn8RS:sky0cloud.dpdns.org"
]

# --- Limits ---
max_request_size = 100000000

# --- Captcha ---
recaptcha_site_key = "YOUR_KEY"
recaptcha_private_site_key = "YOUR_SECRET"

# --- Performance (safe tweaks) ---
cache_capacity_modifier = 1.2

# --- Logging ---
log = "info"

# --- Privacy ---
allow_device_name_federation = false

# --- DNS / stability ---
ip_lookup_strategy = 5
dns_timeout = 10

# --- OPTIONAL Anti-abuse ---
forbidden_usernames = ["admin", "root", "system"]

# --- OPTIONAL Room safety ---
lockdown_public_room_directory = true


# =========================
# 📧 EMAIL (BREVO)
# =========================
[global.smtp]
connection_uri = "smtps://a87cce001%40smtp-brevo.com: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@smtp-relay.brevo.com:465"
sender = "Sky0Cloud <noreply@sky0cloud.dpdns.org>"


# =========================
# 📜 TERMS OF SERVICE
# =========================
[global.registration_terms.tos]
en = { name = "Terms of Service", url = "https://sky0cloud.dpdns.org/tos.html" }


# =========================
# 📞 SUPPORT INFO (NEW FEATURE)
# =========================
[global.well_known]
support_email = "support@sky0cloud.dpdns.org"
support_role = "m.role.admin"


# =========================
# 🚀 OPTIONAL FUTURE FEATURES
# =========================

# Deprioritize slow servers (new feature)
deprioritize_joins_through_servers = ["matrix.org"]

# Disable search engine indexing (privacy)
allow_web_indexing = false

# Better startup sync performance
startup_netburst = true

# Enable presence locally only (lighter)
allow_local_presence = true
allow_outgoing_presence = false
