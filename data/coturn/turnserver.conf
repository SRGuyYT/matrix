# --- Network Routing ---
listening-ip=0.0.0.0
listening-port=3478
external-ip=108.82.191.18

# Relay port range (must be open on your router/firewall for UDP)
min-port=49152
max-port=65535

# --- Matrix / Synapse Authentication ---
realm=sky0cloud.dpdns.org
use-auth-secret
static-auth-secret=Sky0CloudTurnSecret

# --- Core WebRTC Requirements ---
# Mandatory for WebRTC video/audio to function properly
fingerprint

# --- Performance & Mobile Stability ---
# Helps mobile clients maintain calls when switching between WiFi and Cellular
stale-nonce=600

# Unlimited quotas since this is a private server
user-quota=0
total-quota=0

# --- Security (Critical) ---
# Disable the local administration CLI
no-cli

# Prevent bad actors from using your TURN server to scan or attack your internal network
no-multicast-peers
no-loopback-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=100.64.0.0-100.127.255.255

# --- Docker Integration ---
# Output logs cleanly to Docker instead of thrashing the container's virtual disk
simple-log
log-file=stdout
