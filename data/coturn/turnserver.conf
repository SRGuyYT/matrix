# ===========================
# Network & Listening Options
# ===========================

listening-port=3478
listening-ip=0.0.0.0

# Your public IP (required for NAT / TURN clients)
external-ip=108.82.191.18

# Relay ports for WebRTC
min-port=49152
max-port=65535

# ===========================
# Authentication
# ===========================

realm=sky0cloud.dpdns.org

# Shared secret auth (used by Continuwuity + Element)
use-auth-secret
static-auth-secret=Sky0CloudTurnSecret

fingerprint

# ===========================
# Protocol Options
# ===========================

# TURN over UDP/TCP only (recommended for Cloudflare Tunnel setups)
no-tls
no-dtls

# Prevent replay attacks
stale-nonce=600

# ===========================
# Security Hardening
# ===========================

# Disable CLI access
no-cli

# Disable multicast
no-multicast-peers

# Optional: disable TCP relaying (reduces abuse)
no-tcp-relay

# Block local/private networks to prevent abuse
denied-peer-ip=127.0.0.1
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# ===========================
# Logging
# ===========================

simple-log
log-file=stdout
