# ============================
# Coturn Configuration
# Sky0Cloud TURN Server
# ============================

# Ports
listening-port=3478
listening-ip=0.0.0.0

# External IP (public IPv4)
external-ip=108.82.191.18

# Relay port range
min-port=49152
max-port=65535

# Authentication
realm=sky0cloud.dpdns.org
use-auth-secret
static-auth-secret=Sky0CloudTurnSecret
fingerprint

# Cloudflare Tunnel compatibility
no-tls
no-dtls

# Security
stale-nonce=600
no-cli
no-multicast-peers
denied-peer-ip=127.0.0.1
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255

# Logging
simple-log
log-file=stdout
