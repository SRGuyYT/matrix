listening-port=3478
# Use 0.0.0.0 to listen on all interfaces inside the container
listening-ip=0.0.0.0
# ONLY DEFINE THIS ONCE
external-ip=108.82.191.18

# Relay port range
min-port=49152
max-port=65535

# Auth
realm=sky0cloud.dpdns.org
use-auth-secret
static-auth-secret=Sky0CloudTurnSecret
fingerprint

# Performance & Security
stale-nonce=600
no-cli
no-multicast-peers
# Use denied-peer-ip instead of the loopback-peers flag for better compatibility
denied-peer-ip=127.0.0.1
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255

# Logging
simple-log
log-file=stdout
