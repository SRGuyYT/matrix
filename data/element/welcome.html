<style>
    /* Layout container */
    .mx_Parent {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 30px;
        max-width: 600px;
        margin: auto;
    }

    /* Logo */
    .mx_Logo {
        height: 64px;
        margin-bottom: 20px;
    }

    /* Titles */
    .mx_Header_title {
        font-size: 32px;
        font-weight: 700;
        margin: 10px 0 5px;
        color: #ffffff;
    }

    .mx_Header_subtitle {
        font-size: 14px;
        opacity: 0.8;
        margin-bottom: 25px;
        color: #d0d0d0;
    }

    /* Button groups */
    .mx_ButtonGroup {
        margin-top: 10px;
        width: 100%;
    }

    .mx_ButtonRow {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 15px;
        flex-wrap: wrap;
    }

    /* Buttons */
    .mx_ButtonParent {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px 20px;
        border-radius: 6px;
        text-decoration: none;
        font-weight: 600;
        width: 180px;
        transition: 0.15s ease;
    }

    .mx_ButtonParent:hover {
        transform: translateY(-2px);
        opacity: 0.9;
    }

    .mx_ButtonSignIn {
        background-color: #368bd6;
        color: white !important;
    }

    .mx_ButtonCreateAccount {
        background-color: #0dbd8b;
        color: white !important;
    }

    .mx_SecondaryButton {
        background-color: #ffffff;
        color: #2e2f32 !important;
    }

    /* Icons */
    .mx_Button_iconSignIn {
        background-image: url("welcome/images/icon-sign-in.svg");
    }

    .mx_Button_iconCreateAccount {
        background-image: url("welcome/images/icon-create-account.svg");
    }

    .mx_Button_iconRoomDirectory {
        background-image: url("welcome/images/icon-room-directory.svg");
    }

    .mx_ButtonParent {
        background-repeat: no-repeat;
        background-position: 12px center;
    }

    .mx_ButtonLabel {
        margin-left: 22px;
    }

    /* Hide guest functions unless logged in */
    .mx_WelcomePage:not(.mx_WelcomePage_loggedIn) .mx_WelcomePage_guestFunctions {
        display: none;
    }

    /* Mobile */
    @media (max-width: 480px) {
        .mx_ButtonRow {
            flex-direction: column;
        }
        .mx_ButtonParent {
            width: 100%;
        }
    }
</style>

<div class="mx_Parent">
    <img src="$logoUrl" alt="$brand" class="mx_Logo" />

    <h1 class="mx_Header_title">Welcome to Sky0Cloud</h1>
    <h2 class="mx_Header_subtitle">A fast, secure/w ETEE and an fully private chat server</h2>

    <div class="mx_ButtonGroup">
        <div class="mx_ButtonRow">
            <a href="#/login" class="mx_ButtonParent mx_ButtonSignIn mx_Button_iconSignIn">
                <div class="mx_ButtonLabel">Sign In</div>
            </a>

            <a href="#/register" class="mx_ButtonParent mx_ButtonCreateAccount mx_Button_iconCreateAccount">
                <div class="mx_ButtonLabel">Create Account</div>
            </a>
        </div>

        <div class="mx_ButtonRow mx_WelcomePage_guestFunctions">
            <a href="#/directory" class="mx_ButtonParent mx_SecondaryButton mx_Button_iconRoomDirectory">
                <div class="mx_ButtonLabel">Explore Rooms</div>
            </a>
        </div>
    </div>
</div>
