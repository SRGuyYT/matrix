server_name: "sky0cloud.dpdns.org"
public_baseurl: "https://sky0cloud.dpdns.org/"

pid_file: /data/homeserver.pid
signing_key_path: "/data/sky0cloud.dpdns.org.signing.key"

report_stats: true
suppress_key_server_warning: true

listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: true
    bind_addresses: ["0.0.0.0"]
    resources:
      - names: [client, federation]
        compress: true

database:
  name: psycopg2
  args:
    user: synapse_user
    password: Sky0CloudStrongDBPass
    dbname: synapse
    host: postgres
    port: 5432
    cp_min: 5
    cp_max: 15

redis:
  enabled: true
  host: redis
  port: 6379

media_store_path: /data/media_store
uploads_path: /data/uploads
max_upload_size: 100M

enable_registration: true
registration_requires_token: true
registration_shared_secret: Sky0CloudInviteSecret

allow_guest_access: false

trusted_key_servers:
  - server_name: matrix.org

auto_join_rooms:
  - "#general:sky0cloud.dpdns.org"
  - "#announcements:sky0cloud.dpdns.org"

server_notices:
  system_mxid_localpart: "system"
  system_mxid_display_name: "Sky0Cloud System"
  room_name: "Sky0Cloud Server Notices"

turn_uris:
  - "turn:sky0cloud.dpdns.org:3478?transport=udp"
  - "turn:sky0cloud.dpdns.org:3478?transport=tcp"

turn_shared_secret: Sky0CloudTurnSecret
turn_user_lifetime: 86400000
turn_allow_guests: false

caches:
  global_factor: 1.5

rc_message:
  per_second: 0.5
  burst_count: 30
