# ==============================================================================
# Sky0Cloud - Optimized Synapse Configuration
# ==============================================================================

server_name: "sky0cloud.dpdns.org"
public_baseurl: "https://sky0cloud.dpdns.org/"
pid_file: /data/homeserver.pid
signing_key_path: "/data/sky0cloud.dpdns.org.signing.key"
report_stats: true
suppress_key_server_warning: true

# --- Network & Listeners ---
listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: true
    bind_addresses: ["0.0.0.0"]
    resources:
      - names: [client, federation]
        compress: true

trusted_proxies:
  - "127.0.0.1"
  - "172.16.0.0/12"
  - "10.0.0.0/8"

# --- Security (Critical SSRF Protection) ---
# Prevent outgoing requests from being sent to the following blacklisted IP address CIDR ranges[cite: 174, 175].
# The blacklist applies to the outbound requests for federation, identity servers, push servers, etc[cite: 177, 178].
ip_range_blacklist:
  - [cite_start]'127.0.0.0/8' [cite: 190]
  - [cite_start]'10.0.0.0/8' [cite: 192]
  - [cite_start]'172.16.0.0/12' [cite: 193]
  - [cite_start]'192.168.0.0/16' [cite: 193]
  - [cite_start]'100.64.0.0/10' [cite: 196]
  - [cite_start]'192.0.0.0/24' [cite: 196]
  - [cite_start]'169.254.0.0/16' [cite: 197]
  - [cite_start]'192.88.99.0/24' [cite: 198]
  - [cite_start]'198.18.0.0/15' [cite: 199]
  - [cite_start]'192.0.2.0/24' [cite: 200]
  - [cite_start]'198.51.100.0/24' [cite: 201]
  - [cite_start]'203.0.113.0/24' [cite: 202]
  - [cite_start]'224.0.0.0/4' [cite: 203]
  - [cite_start]'::1/128' [cite: 204]
  - [cite_start]'fe80::/10' [cite: 205]
  - [cite_start]'fc00::/7' [cite: 206]
  - [cite_start]'2001:db8::/32' [cite: 207]
  - [cite_start]'ff00::/8' [cite: 208]
  - [cite_start]'fec0::/10' [cite: 209]

# --- Database & Caching ---
database:
  name: psycopg2
  args:
    user: synapse_user
    password: "Sky0CloudStrongDBPass"
    dbname: synapse
    host: postgres
    port: 5432
    cp_min: 5
    cp_max: 15

redis:
  enabled: true
  host: redis
  port: 6379

# --- Performance & Stability Tuning ---
# The GC threshold parameters to pass to `gc.set_threshold`[cite: 148].
[cite_start]gc_thresholds: [700, 10, 10] [cite: 149]
# The minimum time in seconds between each GC for a generation[cite: 150].
[cite_start]gc_min_interval: [0.5s, 30s, 1m] [cite: 158]

# Resource-constrained homeserver settings[cite: 408].
# When this is enabled, the room "complexity" will be checked before a user joins a new remote room[cite: 410].
limit_remote_rooms:
  [cite_start]enabled: true [cite: 418]
  [cite_start]complexity: 1.0 [cite: 419, 421]

# Set the limit on the returned events in the timeline in the get and sync operations[cite: 159, 160].
[cite_start]filter_timeline_limit: 5000 [cite: 164]

# --- Privacy & Access ---
# Require authentication to retrieve profile data (avatars, display names) of other users[cite: 114].
[cite_start]require_auth_for_profile_requests: true [cite: 117]

enable_registration: true
registration_requires_token: true
registration_shared_secret: "Sky0CloudInviteSecret"
allow_guest_access: false

# --- Media Store ---
media_store_path: /data/media_store
uploads_path: /data/uploads
max_upload_size: 100M
# Limit image scaling overhead on the CPU
max_image_pixels: 32000000
dynamic_thumbnails: true

# --- Server Notices ---
server_notices:
  system_mxid_localpart: "system"
  system_mxid_display_name: "Sky0Cloud Account Notice Team"
  room_name: "[Official] Account Notice"

# --- Room Directory ---
allow_public_rooms_over_federation: true
allow_public_rooms_without_auth: true
room_list_publication_rules:
  - user_id: "@system:sky0cloud.dpdns.org"
    alias: "*"
    action: "allow"
