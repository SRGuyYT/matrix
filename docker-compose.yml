services:
  postgres:
    image: postgres:16-alpine
    container_name: sky0cloud-postgres
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse_user
      POSTGRES_PASSWORD: "Sky@Cloud0Tho"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    networks:
      - matrix_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse_user -d synapse"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sky0cloud-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    networks:
      - matrix_network

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: sky0cloud-synapse
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    volumes:
      - ./synapse/data:/data
    networks:
      - matrix_network
    expose:
      - "8008"

  synapse-federation-worker:
    image: matrixdotorg/synapse:latest
    container_name: synapse-federation-worker
    restart: unless-stopped
    environment:
      SYNAPSE_WORKER: federation
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    volumes:
      - ./synapse/data:/data
    networks:
      - matrix_network
    expose:
      - "8008"

  synapse-client-worker:
    image: matrixdotorg/synapse:latest
    container_name: synapse-client-worker
    restart: unless-stopped
    environment:
      SYNAPSE_WORKER: client
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    volumes:
      - ./synapse/data:/data
    networks:
      - matrix_network
    expose:
      - "8008"

  element-web:
    image: vectorim/element-web:latest
    container_name: sky0cloud-element-web
    restart: unless-stopped
    volumes:
      - ./element/config.json:/app/config.json:ro
    networks:
      - matrix_network
    expose:
      - "80"

  synapse-admin:
    image: ghcr.io/etkecc/synapse-admin:latest
    container_name: sky0cloud-synapse-admin
    restart: unless-stopped
    environment:
      BASE_URL: https://sky0cloud.dpdns.org
    networks:
      - matrix_network
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    container_name: sky0cloud-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - matrix_network
    depends_on:
      - synapse
      - element-web

  postgres-backup:
    image: prodrigestivill/postgres-backup-local
    container_name: sky0cloud-postgres-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse_user
      POSTGRES_PASSWORD: "Sky@Cloud0Tho"
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
    volumes:
      - ./postgres/backups:/backups
    networks:
      - matrix_network

  media-cleanup:
    image: matrixdotorg/synapse:latest
    container_name: sky0cloud-media-cleaner
    restart: unless-stopped
    command: >
      bash -c "while true; do
      synapse-admin media delete-old --days 30;
      sleep 86400;
      done"
    volumes:
      - ./synapse/data:/data
    networks:
      - matrix_network

networks:
  matrix_network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
