services:
  element-web:
    image: vectorim/element-web:latest
    container_name: sky0cloud-element-web
    restart: unless-stopped
    volumes:
      - ./element/config.json:/app/config.json:ro
      - ./element/icon.png:/app/icon.png:ro
      - ./element/background.jpg:/app/background.jpg:ro
    depends_on:
      - synapse
    networks:
      - sky0cloud-network
    expose:
      - "80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: sky0cloud-caddy
    restart: unless-stopped
    depends_on:
      - element-web
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./.well-known:/var/www/matrix/.well-known:ro
      - caddy_config:/config
    networks:
      - sky0cloud-network
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  sky0cloud-network:
    name: sky0cloud-network
    driver: bridge

volumes:
  caddy_config:
