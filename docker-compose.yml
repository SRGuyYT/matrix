services:
postgres:
    image: postgres:16-alpine
    container_name: sky0cloud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse_user
      POSTGRES_PASSWORD: Sky@Cloud0Tho
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    networks:
      - sky0cloud-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse_user -d synapse"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: sky0cloud-synapse
    restart: unless-stopped
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
      UID: "991"
      GID: "991"
    volumes:
      - ./synapse/data:/data:rw
      - ./synapse/homeserver.yaml:/data/homeserver.yaml:rw
      - ./synapse/log.config:/data/log.config:rw
    networks:
      - sky0cloud-network
    expose:
      - "8008"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8008/_matrix/client/versions"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  synapse-admin:
    image: awesometechnologies/synapse-admin:latest
    container_name: sky0cloud-synapse-admin
    restart: unless-stopped
    environment:
      SYNAPSE_ADMIN_API_BASE_URL: "https://sky0cloud.dpdns.org"
      REACT_APP_SERVER: "https://sky0cloud.dpdns.org"
      REACT_APP_SERVER_NAME: "sky0cloud.dpdns.org"
    expose:
      - "80"
    ports:
      - "8000:80"
    depends_on:
      - synapse
    networks:
      - sky0cloud-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  element-web:
    image: vectorim/element-web:latest
    container_name: sky0cloud-element-web
    restart: unless-stopped
    volumes:
      - ./element/config.json:/app/config.json:rw
      - ./element/icon.png:/app/icon.png:ro
      - ./element/background.jpg:/app/background.jpg:ro
    depends_on:
      - synapse
    networks:
      - sky0cloud-network
    expose:
      - "80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: sky0cloud-caddy
    restart: unless-stopped
    depends_on:
      - synapse
      - element-web
      - synapse-admin
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - sky0cloud-network
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  sky0cloud-network:
    name: sky0cloud-network
    driver: bridge

volumes:
  caddy_config:
  caddy_data:
