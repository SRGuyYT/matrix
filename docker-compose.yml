version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sky0cloud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: synapse_user
      POSTGRES_PASSWORD: Sky0CloudStrongDBPass
      POSTGRES_DB: synapse
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse_user -d synapse"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sky0cloud-redis
    restart: unless-stopped
    command: ["redis-server","--appendonly","yes"]
    volumes:
      - ./data/redis:/data

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: sky0cloud-synapse
    restart: unless-stopped
    environment:
      SYNAPSE_SERVER_NAME: sky0cloud.dpdns.org
      SYNAPSE_CONFIG_PATH: /data/synapse/homeserver.yaml
    volumes:
      - ./data/synapse:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  element:
    image: vectorim/element-web:latest
    container_name: sky0cloud-element
    restart: unless-stopped
    volumes:
      - ./data/element:/app/config

  synapse-admin:
    image: ghcr.io/etkecc/synapse-admin:latest
    container_name: sky0cloud-synapse-admin
    restart: unless-stopped
    environment:
      SYNAPSE_SERVER: http://sky0cloud-synapse:8008
    depends_on:
      - synapse

  coturn:
    image: coturn/coturn:latest
    container_name: sky0cloud-turn
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data/coturn:/etc/coturn
    command: >
      -n
      --log-file=stdout
      --realm=sky0cloud.dpdns.org
      --use-auth-secret
      --static-auth-secret=Sky0CloudTurnSecret
      --fingerprint
      --total-quota=100
      --bps-capacity=0
      --stale-nonce
      --no-multicast-peers

  postgres-backup:
    image: prodrigestivill/postgres-backup-local
    container_name: sky0cloud-postgres-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse_user
      POSTGRES_PASSWORD: Sky0CloudStrongDBPass
      SCHEDULE: "@daily"
    volumes:
      - ./backup:/backups
    depends_on:
      - postgres

  caddy:
    image: caddy:2-alpine
    container_name: sky0cloud-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data/caddy:/data
      - ./data/caddy_config:/config
    depends_on:
      - synapse
      - element
