version: "3.9"

services:
  continuwuity:
    image: ghcr.io/continuwuity/continuwuity:latest
    container_name: sky0cloud-continuwuity
    restart: unless-stopped
    environment:
      SERVER_NAME: sky0cloud.dpdns.org
      ALLOW_REGISTRATION: "true"
      ALLOW_FEDERATION: "true"
      MAX_REQUEST_SIZE: "524288000"
      PORT: "8008"
    volumes:
      - ./continuwuity/data:/var/lib/continuwuity
    networks:
      - sky0cloud-network

  element-web:
    image: vectorim/element-web:latest
    container_name: sky0cloud-element-web
    restart: unless-stopped
    volumes:
      - ./element/config.json:/app/config.json:ro
    depends_on:
      - continuwuity
    networks:
      - sky0cloud-network

  caddy:
    image: caddy:2-alpine
    container_name: sky0cloud-caddy
    restart: unless-stopped
    depends_on:
      - continuwuity
      - element-web
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - sky0cloud-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: sky0cloud-cloudflared
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    depends_on:
      - caddy
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared:/etc/cloudflared
    healthcheck:
      test: ["CMD", "cloudflared", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - sky0cloud-network

networks:
  sky0cloud-network:
    name: sky0cloud-network
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
