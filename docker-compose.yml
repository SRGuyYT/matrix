services:
  postgres:
    image: postgres:16-alpine
    container_name: sky0cloud-postgres
    restart: unless-stopped
    shm_size: '256mb'
    environment:
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse_user
      POSTGRES_PASSWORD: "Sky@Cloud0Tho"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    networks:
      - sky0cloud-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse_user -d synapse"]
      interval: 5s
      timeout: 5s
      retries: 5

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: sky0cloud-synapse
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
      PYTHONIOENCODING: utf-8
    volumes:
      # We mount the whole data folder. 
      # Your homeserver.yaml should be inside ./synapse/data/
      - ./synapse/data:/data
    networks:
      - sky0cloud-network
    expose:
      - "8008"

  element-web:
    image: vectorim/element-web:latest
    container_name: sky0cloud-element-web
    restart: unless-stopped
    depends_on:
      - synapse
    volumes:
      - ./element/config.json:/app/config.json:ro
    networks:
      - sky0cloud-network

  synapse-admin:
    image: ghcr.io/etkecc/synapse-admin:latest
    container_name: sky0cloud-synapse-admin
    restart: unless-stopped
    depends_on:
      - synapse
    environment:
      - BASE_URL=https://sky0cloud.dpdns.org
    networks:
      - sky0cloud-network

  caddy:
    image: caddy:2-alpine
    container_name: sky0cloud-caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - sky0cloud-network
    depends_on:
      - synapse
      - element-web

networks:
  sky0cloud-network:
    name: matrix_network
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
