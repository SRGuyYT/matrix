services:
  synapse:
    image: matrixdotorg/synapse:latest
    container_name: sky0cloud-synapse
    restart: unless-stopped
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
      UID: "991"
      GID: "991"
    volumes:
      - ./synapse/data:/data
      - ./synapse/homeserver.yaml:/data/homeserver.yaml:ro
      - ./synapse/log.config:/data/log.config:ro
    networks:
      - sky0cloud-network
    expose:
      - "8008"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8008/_matrix/client/versions"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  synapse-admin:
    image: awesometechnologies/synapse-admin:latest
    container_name: sky0cloud-synapse-admin
    restart: unless-stopped
    expose:
      - "80"
    ports:
      - "8000:80"
    depends_on:
      - synapse
    networks:
      - sky0cloud-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  element-web:
    image: vectorim/element-web:latest
    container_name: sky0cloud-element-web
    restart: unless-stopped
    volumes:
      - ./element/config.json:/app/config.json:ro
      - ./element/icon.png:/app/icon.png:ro
      - ./element/background.jpg:/app/background.jpg:ro
    depends_on:
      - synapse
    networks:
      - sky0cloud-network
    expose:
      - "80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: sky0cloud-caddy
    restart: unless-stopped
    depends_on:
      - synapse
      - element-web
      - synapse-admin
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./.well-known:/var/www/matrix/.well-known:ro
      - caddy_config:/config
    networks:
      - sky0cloud-network
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: sky0cloud-cloudflared
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    depends_on:
      - caddy
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    networks:
      - sky0cloud-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  sky0cloud-network:
    name: sky0cloud-network
    driver: bridge

volumes:
  caddy_config:
