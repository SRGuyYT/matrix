services:
  continuwuity:
    image: forgejo.ellis.link/continuwuation/continuwuity:latest
    dns:
      - 1.1.1.1
      - 8.8.8.8
    container_name: sky0cloud-continuwuity
    command: /sbin/conduwuit
    restart: unless-stopped
    volumes:
      - ./data/continuwuity:/var/lib/continuwuity
      - /etc/resolv.conf:/etc/resolv.conf:ro
      - ./data/continuwuity/conduwuit.toml:/etc/continuwuity.toml:ro
      - ./data/continuwuity/appservices:/var/lib/continuwuity/appservices
    environment:
      CONTINUWUITY_CONFIG: /etc/continuwuity.toml
    networks:
      - matrix

  redis:
    image: redis:7-alpine
    container_name: sky0cloud-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - matrix

  hookshot:
    image: halfshot/matrix-hookshot:latest
    container_name: sky0cloud-hookshot
    restart: unless-stopped
    volumes:
      - ./data/hookshot:/data
    ports:
      - "9993:9993"
      - "9001:9000"
    depends_on:
      - continuwuity
    networks:
      - matrix

  element-web:
    image: vectorim/element-web:latest
    container_name: sky0cloud-element-web
    restart: unless-stopped
    volumes:
      - ./data/element/config.sky0cloud.dpdns.org.json:/app/config.json:ro
      - ./data/element/welcome.html:/app/welcome.html:ro
      - ./data/element/background.jpg:/app/background.jpg:ro
      - ./data/element/icon.png:/app/icon.png:ro
    networks:
      - matrix

  coturn:
    image: coturn/coturn:latest
    container_name: sky0cloud-turn
    restart: unless-stopped
    network_mode: host
    command: ["turnserver", "-c", "/etc/turnserver.conf"]
    volumes:
      - ./data/coturn/turnserver.conf:/etc/turnserver.conf:ro

  caddy:
    image: caddy:2-alpine
    container_name: sky0cloud-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy:/data
      - ./data/caddy_config:/config
      - ./data/element/tos.html:/srv/tos.html:ro
      - ./data/element/privacy.html:/srv/privacy.html:ro
    networks:
      - matrix

networks:
  matrix:
    name: matrix_matrix_network
