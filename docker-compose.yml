services:
  sky0cloud-postgres:
    image: postgres:16-alpine
    container_name: sky0cloud-postgres
    restart: always
    environment:
      POSTGRES_USER: synapse_user
      POSTGRES_PASSWORD: "Sky@Cloud0Tho"
      POSTGRES_DB: synapse
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  sky0cloud-redis:
    image: redis:7-alpine
    container_name: sky0cloud-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data

  sky0cloud-synapse:
    image: matrixdotorg/synapse:latest
    container_name: sky0cloud-synapse
    restart: always
    environment:
      SYNAPSE_SERVER_NAME: sky0cloud.dpdns.org
      SYNAPSE_REPORT_STATS: "yes"
    volumes:
      - ./data/homeserver:/data
    depends_on:
      - sky0cloud-postgres
      - sky0cloud-redis

  synapse-generic-worker:
    image: matrixdotorg/synapse:latest
    container_name: synapse-generic-worker
    restart: always
    environment:
      SYNAPSE_SERVER_NAME: sky0cloud.dpdns.org
      SYNAPSE_REPORT_STATS: "yes"
    volumes:
      - ./data/homeserver:/data
    depends_on:
      - sky0cloud-postgres
      - sky0cloud-redis

  synapse-client-worker:
    image: matrixdotorg/synapse:latest
    container_name: synapse-client-worker
    restart: always
    environment:
      SYNAPSE_SERVER_NAME: sky0cloud.dpdns.org
      SYNAPSE_REPORT_STATS: "yes"
    volumes:
      - ./data/homeserver:/data
    depends_on:
      - sky0cloud-postgres
      - sky0cloud-redis

  synapse-federation-worker:
    image: matrixdotorg/synapse:latest
    container_name: synapse-federation-worker
    restart: always
    environment:
      SYNAPSE_SERVER_NAME: sky0cloud.dpdns.org
      SYNAPSE_REPORT_STATS: "yes"
    volumes:
      - ./data/homeserver:/data
    depends_on:
      - sky0cloud-postgres
      - sky0cloud-redis

  sky0cloud-media-cleaner:
    image: matrixdotorg/synapse:latest
    container_name: sky0cloud-media-cleaner
    restart: always
    environment:
      SYNAPSE_SERVER_NAME: sky0cloud.dpdns.org
      SYNAPSE_REPORT_STATS: "yes"
    volumes:
      - ./data/homeserver:/data
    depends_on:
      - sky0cloud-postgres
      - sky0cloud-redis

  sky0cloud-synapse-admin:
    image: ghcr.io/etkecc/synapse-admin:latest
    container_name: sky0cloud-synapse-admin
    restart: always
    environment:
      SYNAPSE_ADMIN_USER: admin
      SYNAPSE_ADMIN_PASSWORD: adminpass
      SYNAPSE_SERVER: http://sky0cloud-synapse:8008
    depends_on:
      - sky0cloud-synapse

  sky0cloud-element-web:
    image: vectorim/element-web:latest
    container_name: sky0cloud-element-web
    restart: always
    environment:
      DEFAULT_SERVER_URL: "https://sky0cloud.dpdns.org"
    volumes:
      - ./data/element-web:/app/config
    ports:
      - "8090:80"   # changed from 8080 to 8090
    depends_on:
      - sky0cloud-synapse

  sky0cloud-caddy:
    image: caddy:2-alpine
    container_name: sky0cloud-caddy
    restart: always
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data/caddy:/data
      - ./config/caddy:/config
    ports:
      - "80:80"
      - "443:443"

  sky0cloud-postgres-backup:
    image: prodrigestivill/postgres-backup-local
    container_name: sky0cloud-postgres-backup
    restart: always
    environment:
      POSTGRES_USER: synapse_user
      POSTGRES_PASSWORD: "Sky@Cloud0Tho"
      POSTGRES_DB: synapse
    volumes:
      - ./backup:/backup
    depends_on:
      - sky0cloud-postgres
