services:
  continuwuity:
    image: ghcr.io/continuwuity/continuwuity:latest
    container_name: sky0cloud-continuwuity
    restart: unless-stopped
    environment:
      PORT: "6167"
    volumes:
      - ./continuwuity/conduwuit.toml:/etc/continuwuity.toml
      - ./continuwuity/data:/data
      - ./data_backup:/data_backup
    networks:
      - sky0cloud-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6167/_matrix/client/versions"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  element-web:
    image: vectorim/element-web:latest
    container_name: sky0cloud-element-web
    restart: unless-stopped
    volumes:
      - ./element/config.json:/app/config.json:ro
      - ./element/icon.png:/app/icon.png:ro
      - ./element/background.jpg:/app/background.jpg:ro
    depends_on:
      - continuwuity
    networks:
      - sky0cloud-network

  caddy:
    image: caddy:2-alpine
    container_name: sky0cloud-caddy
    restart: unless-stopped
    depends_on:
      - continuwuity
      - element-web
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - sky0cloud-network

networks:
  sky0cloud-network:
    name: sky0cloud-network
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
