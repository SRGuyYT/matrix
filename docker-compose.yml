version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: matrix-postgres
    restart: always
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: StrongMatrixPassword
      POSTGRES_DB: synapse
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d synapse"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: matrix-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: matrix-synapse
    restart: always
    environment:
      SYNAPSE_SERVER_NAME: sky0cloud.dpdns.org
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    volumes:
      - ./data:/data
    depends_on:
      - postgres
      - redis

  element:
    image: vectorim/element-web:latest
    container_name: matrix-element
    restart: always
    ports:
      - "8090:80"
    volumes:
      - ./data/element:/app/config

  synapse-admin:
    image: ghcr.io/etkecc/synapse-admin:latest
    container_name: matrix-admin
    restart: always
    environment:
      SYNAPSE_SERVER: http://synapse:8008
    depends_on:
      - synapse

  caddy:
    image: caddy:2-alpine
    container_name: matrix-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data/caddy:/data
      - ./config:/config
    depends_on:
      - synapse
      - element
