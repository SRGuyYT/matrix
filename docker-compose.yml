services:
  continuwuity:
    image: ghcr.io/continuwuity/continuwuity:latest
    container_name: sky0cloud-continuwuity
    restart: unless-stopped
    environment:
      PORT: "8008"
    volumes:
      - ./continuwuity/continuwuity.toml:/etc/continuwuity.toml
      - ./continuwuity/data:/var/lib/continuwuity
    networks:
      - sky0cloud-network

  element-web:
    image: vectorim/element-web:latest
    container_name: sky0cloud-element-web
    restart: unless-stopped
    volumes:
      - ./element/config.json:/app/config.json
      - ./element/icon.png:/app/icon.png
      - ./element/background.jpg:/app/background.jpg
    depends_on:
      - continuwuity
    networks:
      - sky0cloud-network

  caddy:
    image: caddy:2-alpine
    container_name: sky0cloud-caddy
    restart: unless-stopped
    depends_on:
      - continuwuity
      - element-web
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - sky0cloud-network
      
networks:
  sky0cloud-network:
    name: sky0cloud-network
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
