services:
  postgres:
    image: postgres:16-alpine
    container_name: sky0cloud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse_user
      POSTGRES_PASSWORD: Sky@Cloud0Tho
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    networks:
      - sky0cloud-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse_user -d synapse"]
      interval: 10s
      timeout: 5s
      retries: 10

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: sky0cloud-synapse
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    volumes:
      - ./synapse/data:/data
      - ./synapse/homeserver.yaml:/data/homeserver.yaml
    networks:
      - sky0cloud-network
    expose:
      - "8008"

  element-web:
    image: vectorim/element-web:latest
    container_name: sky0cloud-element-web
    restart: unless-stopped
    depends_on:
      - synapse
    volumes:
      - ./element/config.json:/app/config.json
      - ./element/icon.png:/app/icon.png
      - ./element/background.jpg:/app/background.jpg
    networks:
      - sky0cloud-network
    expose:
      - "80"

  synapse-admin:
    image: awesometechnologies/synapse-admin:latest
    container_name: sky0cloud-synapse-admin
    restart: unless-stopped
    depends_on:
      - synapse
    environment:
      REACT_APP_SERVER: https://sky0cloud.dpdns.org
    networks:
      - sky0cloud-network
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    container_name: sky0cloud-caddy
    restart: unless-stopped
    depends_on:
      - synapse
      - element-web
      - synapse-admin
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - sky0cloud-network

networks:
  sky0cloud-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
