version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: sky0cloud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: CHANGE_ME_POSTGRES_PASSWORD
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - matrix

  redis:
    image: redis:7
    container_name: sky0cloud-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - matrix

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: sky0cloud-synapse
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      SYNAPSE_SERVER_NAME: sky0cloud.dpdns.org
      SYNAPSE_REPORT_STATS: "yes"
    volumes:
      - ./data/synapse:/data
    networks:
      - matrix

  element-web:
    image: vectorim/element-web:latest
    container_name: sky0cloud-element-web
    restart: unless-stopped
    volumes:
      # Your customized app bits
      - ./data/element/config.json:/app/config.json:ro
      - ./data/element/welcome.html:/app/welcome.html:ro
      - ./data/element/background.jpg:/app/background.jpg:ro
      - ./data/element/icon.png:/app/icon.png:ro
      - ./data/element/sw.js:/app/sw.js:ro
    networks:
      - matrix

  caddy:
    image: caddy:2
    container_name: sky0cloud-caddy
    restart: unless-stopped
    depends_on:
      - synapse
      - element-web
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy:/data
      - ./data/caddy:/config
    networks:
      - matrix

  coturn:
    image: coturn/coturn:latest
    container_name: sky0cloud-turn
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ./data/coturn/turnserver.conf:/etc/turnserver.conf:ro
      - ./data/coturn:/var/lib/coturn
    command: ["turnserver", "-c", "/etc/turnserver.conf"]

  synapse-admin:
    image: ghcr.io/etkecc/synapse-admin:latest
    container_name: sky0cloud-synapse-admin
    restart: unless-stopped
    depends_on:
      - synapse
    environment:
      SYNAPSE_ADMIN_HOMESERVER_URL: http://sky0cloud-synapse:8008
    networks:
      - matrix

networks:
  matrix:
    name: matrix_matrix_network
