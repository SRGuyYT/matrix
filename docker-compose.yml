services:
  continuwuity:
    image: ghcr.io/continuwuity/continuwuity:latest
    container_name: sky0cloud-continuwuity
    restart: unless-stopped
    environment:
      PORT: "6167"
      CONDUWUIT_CONFIG: '/etc/conduwuit.toml'
    volumes:
      - /etc/resolv.conf:/etc/resolv.conf:ro
      - ./continuwuity/continuwuity.toml:/etc/conduwuit.toml:rw
      - ./continuwuity/data:/var/lib/conduwuit:rw
      - ./data_backup:/var/lib/conduwuit_backup:rw
    networks:
      - sky0cloud-network
    expose:
      - "6167"
      - "8000"

  element-web:
    image: vectorim/element-web:latest
    container_name: sky0cloud-element-web
    restart: unless-stopped
    environment:
      - BASE_URL=https://sky0cloud.dpdns.org
    volumes:
      - ./element/config.json:/app/config.json:ro
      - ./element/icon.png:/app/icon.png:ro
      - ./element/background.jpg:/app/background.jpg:ro
    depends_on:
      - continuwuity
    networks:
      - sky0cloud-network
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    container_name: sky0cloud-caddy
    restart: unless-stopped
    depends_on:
      - continuwuity
      - element-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:rw
      - caddy_data:/data
      - caddy_config:/config
      - ./.well-known:/var/www/matrix/.well-known:ro
    networks:
      - sky0cloud-network
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  sky0cloud-network:
    name: sky0cloud-network
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
