services:
  continuwuity:
    image: forgejo.ellis.link/continuwuation/continuwuity:latest
    container_name: sky0cloud-continuwuity
    restart: unless-stopped
    ports:
      - "6167:6167"
    environment:
      CONTINUWUITY_SERVER_NAME: sky0cloud.dpdns.org
      CONTINUWUITY_DATABASE_PATH: /var/lib/continuwuity
      CONTINUWUITY_ADDRESS: 0.0.0.0
      CONTINUWUITY_ALLOW_REGISTRATION: "true"
      #CONTINUWUITY_REGISTRATION_TOKEN: "omg"
      CONTINUWUITY_RECAPTCHA_SITE_KEY: "6LdhVIUsAAAAAExFNW2lKBmZJ8Reh6mGNtV5AxSe"
      CONTINUWUITY_RECAPTCHA_PRIVATE_SITE_KEY: "6LdhVIUsAAAAAPv3_PKe5YH9mZZQozeuKnOgasKb"
      CONTINUWUITY_MAX_REQUEST_SIZE: 100000000
    volumes:
      - ./data/continuwuity:/var/lib/continuwuity
    networks:
      - matrix

  element-web:
    image: vectorim/element-web:latest
    container_name: sky0cloud-element-web
    restart: unless-stopped
    volumes:
      - ./data/element/config.sky0cloud.dpdns.org.json:/app/config.json:ro
      - ./data/element/welcome.html:/app/welcome.html:ro
      - ./data/element/background.jpg:/app/background.jpg:ro
      - ./data/element/icon.png:/app/icon.png:ro
    networks:
      - matrix

  coturn:
    image: coturn/coturn:latest
    container_name: sky0cloud-turn
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data/coturn/turnserver.conf:/etc/turnserver.conf:ro
    command: ["turnserver", "-c", "/etc/turnserver.conf"]

  postgres:
    image: postgres:16-alpine
    container_name: sky0cloud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: continuwuity_user
      POSTGRES_PASSWORD: Sky0CloudStrongDBPass
      POSTGRES_DB: continuwuity
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  postgres-backup:
    image: prodrigestivill/postgres-backup-local
    container_name: sky0cloud-postgres-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: continuwuity
      POSTGRES_USER: continuwuity_user
      POSTGRES_PASSWORD: Sky0CloudStrongDBPass
      SCHEDULE: "@daily"
    volumes:
      - ./backup:/backups
    depends_on:
      - postgres

  caddy:
    image: caddy:2-alpine
    container_name: sky0cloud-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy:/data
      - ./data/caddy_config:/config
    depends_on:
      - continuwuity
      - element-web
    networks:
      - matrix
      
networks:
  matrix:
    name: matrix_matrix_network
