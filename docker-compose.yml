services:
  continuwuity:
    image: forgejo.ellis.link/continuwuation/continuwuity:latest
    container_name: sky0cloud-continuwuity
    restart: unless-stopped
    expose:
       - "8008"
    environment:
      CONDUWUIT_REQUEST_TIMEOUT: 30000
      CONTINUWUITY_TRUSTED_SERVERS: '["matrix.org"]'
      CONTINUWUITY_SERVER_NAME: sky0cloud.dpdns.org
      CONTINUWUITY_DATABASE_PATH: /var/lib/continuwuity
      CONTINUWUITY_ADDRESS: 0.0.0.0
      CONTINUWUITY_PORT: 8008
      CONTINUWUITY_ALLOW_REGISTRATION: "true"
      CONTINUWUITY_NEW_USER_DISPLAYNAME_SUFFIX: ""
      CONTINUWUITY_ADMINS_LIST: '["@admin:sky0cloud.dpdns.org", "@dienic:sky0cloud.dpdns.org", "@conduit:sky0cloud.dpdns.org"]'
      CONDUIT_AUTO_JOIN_ROOMS: '["!2MBteHG2EqAuy4GWiU:sky0cloud.dpdns.org", "!w22RyA5q5qtKTnn8RS:sky0cloud.dpdns.org"]'
      CONTINUWUITY_RECAPTCHA_SITE_KEY: "6LdhVIUsAAAAAExFNW2lKBmZJ8Reh6mGNtV5AxSe"
      CONTINUWUITY_RECAPTCHA_PRIVATE_SITE_KEY: "6LdhVIUsAAAAAPv3_PKe5YH9mZZQozeuKnOgasKb"
      CONTINUWUITY_MAX_REQUEST_SIZE: 100000000
      CONTINUWUITY_SMTP_HOST: smtp-relay.brevo.com
      CONTINUWUITY_SMTP_PORT: "587"
      CONTINUWUITY_SMTP_USERNAME: "a87cce001@smtp-brevo.com"
      CONTINUWUITY_SMTP_PASSWORD: "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"
      CONTINUWUITY_SMTP_FROM: "noreply@sky0cloud.dpdns.org"
      CONTINUWUITY_SMTP_TLS: "true"
    volumes:
      - /etc/resolv.conf:/etc/resolv.conf:ro
      - ./data/continuwuity:/var/lib/continuwuity
    networks:
      - matrix

  element-web:
    image: vectorim/element-web:latest
    container_name: sky0cloud-element-web
    restart: unless-stopped
    volumes:
      - ./data/element/config.sky0cloud.dpdns.org.json:/app/config.json:ro
      - ./data/element/welcome.html:/app/welcome.html:ro
      - ./data/element/background.jpg:/app/background.jpg:ro
      - ./data/element/icon.png:/app/icon.png:ro
    networks:
      - matrix

  coturn:
    image: coturn/coturn:latest
    container_name: sky0cloud-turn
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data/coturn/turnserver.conf:/etc/turnserver.conf:ro
    command: ["turnserver", "-c", "/etc/turnserver.conf"]

  caddy:
    image: caddy:2-alpine
    container_name: sky0cloud-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy:/data
      - ./data/caddy_config:/config
    depends_on:
      - continuwuity
      - element-web
    networks:
      - matrix
      
networks:
  matrix:
    name: matrix_matrix_network
