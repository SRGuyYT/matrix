# Homeserver identity
server_name: "sky0cloud.dpdns.org"
public_baseurl: "https://sky0cloud.dpdns.org/"

# Process management
pid_file: /data/homeserver.pid
signing_key_path: "/data/sky0cloud.dpdns.org.signing.key"

# Reporting
report_stats: true
suppress_key_server_warning: true

# Directory settings
media_store_path: "/data/media_store"
uploads_path: "/data/uploads"
max_upload_size: 100M
max_image_pixels: 32M

# Listeners
listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: true
    bind_addresses: ["0.0.0.0"]
    resources:
      - names: [client, federation]
        compress: true

# Database
database:
  name: psycopg2
  args:
    user: synapse_user
    password: "Sky@Cloud0Tho"
    dbname: synapse
    host: sky0cloud-postgres
    port: 5432
    cp_min: 5
    cp_max: 15
    allow_unsafe_locale: true

# Redis (for workers & caching)
redis:
  enabled: true
  host: sky0cloud-redis
  port: 6379

# Registration
enable_registration: true
registration_requires_token: true
registration_shared_secret: "itoldyou"
allow_guest_access: false

# Trusted proxies (for Caddy reverse proxy)
trusted_proxies:
  - "127.0.0.1"
  - "172.16.0.0/12"
  - "10.0.0.0/8"

# Security secrets
macaroon_secret_key: "23dc71ec52cc8e18dc0afbf1df20f0d53b471377321d4ae664afa511f3919a71de5466e6432a95d8e48d47b2be17099536fc6d83512a08b984746be3f1324c5b"
form_secret: "538aef9fc03da17410a71d57bca5c5383db6784db2b40a8d07b208f01bf2f2629abcbe68d424a976c5664fc66ceef4e4a76440ff13c77822c814489f19621bfd"

# Server notices
server_notices:
  system_mxid_localpart: "system"
  system_mxid_display_name: "System Administrator"
  room_name: "Server Notices"

# Auto-join rooms
auto_join_rooms:
  - "#general:sky0cloud.dpdns.org"
  - "#info:sky0cloud.dpdns.org"

# Trusted key servers
trusted_key_servers:
  - server_name: "matrix.org"

# Federation performance
federation:
  client_timeout: 60s
  max_long_retry_delay: 60s

rc_federation:
  window_size: 1000
  sleep_limit: 10
  sleep_delay: 500
  reject_limit: 50
  concurrent: 12     # improved for larger rooms

# Large room protection
limit_remote_rooms:
  enabled: false

# Experimental features
experimental_features:
  faster_joins: true
  msc2654_enabled: true     # optional, improves sync performance

# Room directory
allow_public_rooms_over_federation: true
allow_public_rooms_without_auth: true
room_list_publication_rules:
  - user_id: "@system:sky0cloud.dpdns.org"
    alias: "*"
    action: "allow"

# Caching
caches:
  global_factor: 1.5
event_cache_size: 200K
background_updates:
  background_update_duration_ms: 100

# Rate limiting
rc_message:
  per_second: 0.5
  burst_count: 30

# Optional retention policy
retention:
  enabled: true
  default_policy:
    min_lifetime: 1d
    max_lifetime: 365d
