server_name: "sky0cloud.dpdns.org"
pid_file: /data/homeserver.pid
public_baseurl: "https://sky0cloud.dpdns.org/"

listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: true
    bind_addresses: ['0.0.0.0']
    resources:
      - names: [client, federation]
        compress: false

# PostgreSQL backend
database:
  name: psycopg2
  args:
    user: synapse_user
    password: Sky@Cloud0Tho
    dbname: synapse
    host: sky0cloud-postgres
    port: 5432
    cp_min: 5
    cp_max: 10
    keepalives_idle: 10
    keepalives_interval: 10
    keepalives_count: 3

media_store_path: /data/media_store
macaroon_secret_key: "23dc71ec52cc8e18dc0afbf1df20f0d53b471377321d4ae664afa511f3919a71de5466e6432a95d8e48d47b2be17099536fc6d83512a08b984746be3f1324c5b"
form_secret: "538aef9fc03da17410a71d57bca5c5383db6784db2b40a8d07b208f01bf2f2629abcbe68d424a976c5664fc66ceef4e4a76440ff13c77822c814489f19621bfd"
signing_key_path: "/data/sky0cloud.dpdns.org.signing.key"

trusted_key_servers:
  - server_name: "matrix.org"
  - server_name: "sky0cloud.dpdns.org"

# Cache tuning for 8GB RAM host.
caches:
  global_factor: 0.5

max_upload_size: "95M"

allow_guest_access: false

# --- REGISTRATION LOCK SETTINGS ---
enable_registration: true
registration_requires_token: true
registration_shared_secret: "itoldyou"
enable_registration_without_verification: true
# ----------------------------------

enable_3pid_changes: true

# Mailgun SMTP
email:
  smtp_host: "smtp.mailgun.org"
  smtp_port: 587
  smtp_user: "official@no-reply.skyservers.qzz.io"
  smtp_pass: "TheBoss123?com"
  require_transport_security: true
  notif_from: "Sky0Cloud Matrix <official@no-reply.skyservers.qzz.io>"
  app_name: "Sky0Cloud Matrix"
  client_base_url: "https://sky0cloud.dpdns.org"
  invite_client_location: "https://sky0cloud.dpdns.org"
  validation_token_lifetime: 1h

account_threepid_delegates: {}

password_config:
  enabled: true

room_list_publication_rules:
  - user_id: "@*:sky0cloud.dpdns.org"
    action: allow
  - action: deny

rc_message:
  per_second: 0.2
  burst_count: 10

report_stats: true
