server_name: "sky0cloud.dpdns.org"
public_baseurl: "https://sky0cloud.dpdns.org/"
pid_file: /data/homeserver.pid
signing_key_path: "/data/sky0cloud.dpdns.org.signing.key"
report_stats: true
suppress_key_server_warning: true 

## --- Auto Join Servers --- ##
auto_join_rooms:
  - "#general:sky0cloud.dpdns.org"
  - "#info:sky0cloud.dpdns.org"

## --- LISTENERS & TRUSTED PROXIES --- ##
listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: true 
    bind_addresses: ['0.0.0.0']
    resources:
      - names: [client, federation]
        compress: false

## --- SERVER NOTICES (Fixes 400 Error) --- ##
server_notices:
  system_mxid_localpart: "system"
  system_mxid_display_name: "System Administrator"
  room_name: "Server Notices"

# --- ROOM DIRECTORY & PUBLISHING (Fixes 403 Error) --- #
allow_public_rooms_over_federation: true
allow_public_rooms_without_auth: true
# Explicitly allow the admin user to publish rooms
room_list_publication_rules:
  - user_id: "@system:sky0cloud.dpdns.org"
    alias: "*"
    action: "allow"

# --- UNIVERSAL CORS --- #
cors_allow_origin:
  - "*"

trusted_proxies:
  - "127.0.0.1"
  - "172.16.0.0/12" 
  - "10.0.0.0/8"    

## --- DATABASE (POSTGRES) --- ##
database:
  name: psycopg2
  args:
    user: synapse_user
    password: "Sky@Cloud0Tho"
    dbname: synapse
    host: sky0cloud-postgres
    port: 5432
    cp_min: 5
    cp_max: 15

## --- REGISTRATION & TOKENS --- ##
enable_registration: true
registration_requires_token: true 
registration_shared_secret: "itoldyou"
allow_guest_access: false

## --- EMAIL (MAILGUN) --- ##
email:
  enable_notifs: true
  smtp_host: "smtp.mailgun.org"
  smtp_port: 587
  smtp_user: "official@no-reply.skyservers.qzz.io"
  smtp_pass: "TheBoss123?com"
  require_transport_security: true
  notif_from: "Sky0Cloud Matrix <official@no-reply.skyservers.qzz.io>"
  app_name: "Sky0Cloud Matrix"
  client_base_url: "https://sky0cloud.dpdns.org"
  validation_token_lifetime: 1h

account_threepid:
  email:
    client_can_lookup: true
    address_is_trusted: true

## --- MEDIA & CACHING --- ##
media_store_path: /data/media_store
max_upload_size: "100M" 
caches:
  global_factor: 1.2 

